name: Publish Docker images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag without leading v (for example 1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: wsams/httpd
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "${VERSION}" || "${VERSION}" == v* ]]; then
            echo "Unable to resolve a clean version from '${VERSION}'" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.REGISTERY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push release images
        run: |
          chmod +x scripts/build-images.sh
          PUSH=true \
            FLOAT_BASE=latest \
            FLOAT_PHP=php \
            FLOAT_PYTHON=python \
            IMAGE_NAME="${IMAGE_NAME}" \
            ./scripts/build-images.sh "${{ steps.version.outputs.version }}"
