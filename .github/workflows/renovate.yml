name: Renovate

on:
  schedule:
    # Run twice daily; Renovate will open/update and automerge eligible PRs.
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
          # Use conventional commits so semantic-release can cut versions for dependency bumps.
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate@whitesourcesoftware.com>
