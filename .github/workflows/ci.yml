name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: wsams/httpd
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build all image flavors
        run: |
          chmod +x scripts/build-images.sh
          IMAGE_NAME="${IMAGE_NAME}" ./scripts/build-images.sh ci
