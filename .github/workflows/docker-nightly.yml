name: Nightly Docker images

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: wsams/httpd
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Set nightly tags
        run: |
          DATE_TAG="nightly-$(date -u +'%Y%m%d')"
          echo "DATE_TAG=${DATE_TAG}" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.REGISTERY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push nightly images
        run: |
          chmod +x scripts/build-images.sh
          PUSH=true \
            FLOAT_BASE=nightly \
            FLOAT_PHP=php-nightly \
            FLOAT_PYTHON=python-nightly \
            IMAGE_NAME="${IMAGE_NAME}" \
            ./scripts/build-images.sh "${DATE_TAG}"
