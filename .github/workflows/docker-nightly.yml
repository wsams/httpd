name: Nightly Docker image

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: wsams/httpd
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set nightly tag
        run: echo "DATE_TAG=nightly-$(date -u +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.REGISTERY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push nightly image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          pull: true
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:nightly
            ${{ env.IMAGE_NAME }}:${{ env.DATE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
