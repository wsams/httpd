# Serve .py files as WSGI scripts so index.py works like index.php.
# Each .py file must expose a WSGI callable named `application`.
<Directory /var/www/html>
  Options Indexes FollowSymLinks ExecCGI
  AllowOverride None
  Require all granted
  AddHandler wsgi-script .py
  DirectoryIndex index.py index.html
</Directory>
